#=================================================================
# minio (上传图片需要，需配置成自己的地址)
#=================================================================
minio:
  endpoint: http://127.0.0.1:9000
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
#=================================================================
# 对象存储配置
#=================================================================
storage:
  minio:
    endpoint: http://127.0.0.1:9000
    accessKey: ${MINIO_ACCESS_KEY:}
    secretKey: ${MINIO_SECRET_KEY:}
  aliyun-oss:
    # OSS 服务的访问域名，请根据实际使用的 OSS 区域替换为对应的 endpoint
    endpoint: oss-cn-hangzhou.aliyuncs.com # 改成你自己的
    # 阿里云账号的 AccessKey ID，用于身份验证
    accessKey: ${ALIYUN_ACCESS_KEY_ID:}
    # 阿里云账号的 AccessKey Secret，用于身份验证
    secretKey: ${ALIYUN_ACCESS_KEY_SECRET:} # 改成你自己的
